            type: 'variable',
            method: 'Carte',
            date: new Date().toISOString().split('T')[0],
            note: '',
            status: 'ok',
          }
        });
        toast(`${quickLabel.trim()} · ${fmtEUR(amt)} ajouté`);
        closeQuick();
      };

      /* couleur de la jauge selon remplissage */
      const barColor = over ? 'var(--red)' : pct > 80 ? 'var(--orange)' : 'var(--green-800)';

      return (
        <div style={{background:'var(--card)',border:`1px solid ${quickAdd?'var(--green-700)':'var(--border)'}`,borderRadius:20,padding:'18px 20px',display:'flex',flexDirection:'column',gap:12,transition:'border-color 180ms ease'}}>
          {/* Header */}
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:36,height:36,borderRadius:12,background:cat.color+'22',color:cat.color,display:'grid',placeItems:'center',flexShrink:0}}>
              <I name={cat.icon||'target'} size={17}/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:14.5}}>{cat.name}</div>
              <div style={{fontSize:12,color:'var(--text-3)',marginTop:1}}>
                {budget > 0 ? `${fmtEUR(spent)} dépensé · ${fmtEUR(Math.abs(remaining))} ${remaining>=0?'restant':'de dépassement'}` : 'Aucun budget défini'}
              </div>
            </div>
            {/* Bouton saisie rapide */}
            <button className="row-btn" onClick={quickAdd ? closeQuick : openQuick}
              title={quickAdd ? 'Annuler' : 'Saisir une dépense'}
              style={{flexShrink:0,background:quickAdd?'var(--green-100)':'',color:quickAdd?'var(--green-800)':''}}>
              <I name={quickAdd ? 'x' : 'plus'} size={13}/>
            </button>
            <button className="row-btn" onClick={()=>{setDraftBudget(budget);setEditing(e=>!e);setQuickAdd(false);}} title="Modifier le budget" style={{flexShrink:0}}>
              <I name="edit" size={13}/>
            </button>
          </div>

          {/* Saisie rapide inline */}
          {quickAdd && (
            <div style={{background:'var(--green-50)',borderRadius:14,padding:'12px 14px',display:'flex',flexDirection:'column',gap:10}}>
              <div style={{fontSize:12,fontWeight:600,color:'var(--green-800)',marginBottom:2}}>Saisie rapide · {cat.name}</div>
              <input
                ref={quickRef}
                type="text"
                className="input"
                placeholder="Ex. Dîner resto"
                value={quickLabel}
                onChange={e=>setQuickLabel(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter')quickRef.current?.blur();}}
                style={{padding:'8px 12px',fontSize:13}}
              />
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <input
                  type="number"
                  className="input"
                  placeholder="Montant"
                  min={0}
                  value={quickAmount}
                  onChange={e=>setQuickAmount(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter')submitQuick();}}
                  style={{flex:1,padding:'8px 12px',fontSize:13,textAlign:'right'}}
                />
                <span style={{fontSize:13,color:'var(--text-2)',fontWeight:600}}>€</span>
                <button className="btn primary sm" onClick={submitQuick} style={{padding:'7px 14px',fontSize:12.5,whiteSpace:'nowrap'}}>
                  Ajouter
                </button>
              </div>
              {budget > 0 && (
                <div style={{fontSize:11.5,color:'var(--text-3)'}}>
                  {remaining > 0
                    ? `Il reste ${fmtEUR(remaining)} sur ce budget`
                    : `Budget dépassé de ${fmtEUR(Math.abs(remaining))}`}
                </div>
              )}
            </div>
          )}

          {/* Budget edit inline */}
          {editing && (
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 12px',background:'var(--green-50)',borderRadius:12}}>
              <span style={{fontSize:13,color:'var(--text-2)',whiteSpace:'nowrap'}}>Budget mensuel :</span>
              <input type="number" className="input" style={{width:90,padding:'5px 8px',fontSize:13,textAlign:'right'}} min={0} value={draftBudget} onChange={e=>setDraftBudget(+e.target.value||0)}/>
              <span style={{fontSize:13,color:'var(--text-2)'}}>€</span>
              <button className="btn primary sm" onClick={saveBudget} style={{marginLeft:'auto',padding:'5px 12px',fontSize:12.5}}>OK</button>
              <button className="btn ghost sm" onClick={()=>setEditing(false)} style={{padding:'5px 10px',fontSize:12.5}}>✕</button>
            </div>
          )}

          {/* Progress bar */}
          {budget > 0 ? (
            <>
              <div style={{background:over?'var(--red-soft)':'var(--card-soft)',borderRadius:8,height:6,overflow:'hidden'}}>
                <div style={{width:`${pct}%`,height:'100%',background:barColor,borderRadius:8,transition:'width 500ms ease'}}/>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span className="tnum" style={{fontSize:13,fontWeight:700,color:over?'var(--red)':'var(--text)'}}>{fmtEUR(spent)}</span>
                <span style={{fontSize:11.5,fontWeight:600,color:over?'var(--red)':'var(--text-3)'}}>
                  {over ? `+${fmtEUR(Math.abs(remaining))} dépassé` : `${pct}% du budget`}
                </span>
                <span className="tnum" style={{fontSize:13,fontWeight:600,color:'var(--text-2)'}}>{fmtEUR(budget)}</span>
              </div>
            </>
          ) : (
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0'}}>
              <div style={{flex:1,background:'var(--border)',borderRadius:8,height:4}}/>
              <button onClick={()=>{setDraftBudget(0);setEditing(true);}}
                style={{fontSize:12,color:'var(--green-800)',fontWeight:600,border:'none',background:'none',cursor:'pointer',padding:0,whiteSpace:'nowrap'}}>
                + Définir un budget →
              </button>
            </div>
          )}
        </div>
      );
    };

    const Depenses = ({ state, dispatch, openForm, askConfirm, toast }) => {
      const mk            = state.selectedMonth;
      const available     = getAvailableIncome(state);   /* Current month net income */
      const allocs        = getCatAllocations(state);
      const totalBudgeted = getPlannedTotal(state);      /* Sum of all category budgets = committed */
      const totalSpent    = allocs.reduce((s,c) => s + c.spent, 0);
      const disposable    = getDisposableSurplus(state); /* income - planned = truly free */
      const allocPct      = getAllocPct(state);

      const all = state.transactions.filter(t => t.mk===mk && t.amount<0);
      const [catFilter,  setCatFilter]  = useState('Toutes');
      const [typeFilter, setTypeFilter] = useState('Tous');

      const filtered = all.filter(t => {
        const cat = state.categories.find(c=>c.id===t.cat);
        if (catFilter!=='Toutes' && (!cat||cat.name!==catFilter)) return false;
        if (typeFilter!=='Tous'  && t.type!==typeFilter.toLowerCase()) return false;
        return true;
      });

      const handleDelete = (t) => askConfirm(t.name, () => {
        dispatch({type:'DELETE_TRANSACTION', id:t.id});
        toast('Dépense supprimée');
      });

      return (
        <div className="main-col" style={{gridColumn:'1/-1'}}>
          <div className="page-header">
            <div><EditableTitle pageId="depenses" defaultLabel="Objectifs" state={state} dispatch={dispatch}/><div className="sub">{mkLabel(mk)}</div></div>
            <Button variant="primary" leftIcon="plus" onClick={()=>openForm('expense')}>Saisir une dépense</Button>
          </div>

          {/* ── STAT CARDS ── */}
          <div className="stat-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
            <StatCard icon="budgets" iconBg="var(--orange-soft)" value={fmtEUR(totalBudgeted)} label="Dépenses fixes"         delta={`${allocs.filter(c=>c.budget>0).length} postes planifiés`} deltaTone="neu"/>
            <StatCard icon="wallet"  iconBg="var(--green-100)"   value={fmtEUR(Math.max(0,totalBudgeted-totalSpent))} label="Reste à dépenser" delta={totalBudgeted>0?fmtPct(Math.max(0,(totalBudgeted-totalSpent)/totalBudgeted*100))+' des enveloppes':' — '} deltaTone={totalSpent>totalBudgeted?'neg':'pos'}/>
            <StatCard icon="wallet"  iconBg={disposable<0&&available>0?"var(--red-soft)":"var(--green-100)"} value={fmtEUR(Math.max(0,disposable))} label="Reste disponible" delta={disposable<0&&available>0?'Revoir les dépenses fixes':'à distribuer vers objectifs'} deltaTone={disposable<0&&available>0?'neg':'pos'}/>
          </div>

          {/* ── BUDGET CATEGORY CARDS ── */}
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div>
                <div style={{fontWeight:700,fontSize:16,letterSpacing:'-.01em'}}>Dépenses fixes par catégorie</div>
                <div style={{fontSize:13,color:'var(--text-2)',marginTop:2}}>Définis ton enveloppe mensuelle pour chaque poste</div>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
              {allocs.map(cat => (
                <BudgetCatCard key={cat.id} cat={cat} dispatch={dispatch} toast={toast} selectedMonth={mk}/>
              ))}
            </div>
          </div>

          {/* ── EXPENSE HISTORY ── */}
          <div className="card">
            <div className="card-title-row" style={{alignItems:'flex-start',flexWrap:'wrap',gap:14}}>
              <div>
                <div className="card-title">Dépenses enregistrées</div>
                <div className="card-sub">{all.length} opération{all.length>1?'s':''} ce mois · {fmtEUR(totalSpent)}</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8,alignItems:'flex-end'}}>
                <Segment items={[{value:'Tous',label:'Tous'},{value:'Fixe',label:'Fixe'},{value:'Variable',label:'Variable'}]} value={typeFilter} onChange={setTypeFilter}/>
                <div className="filterbar">
                  {['Toutes',...state.categories.map(c=>c.name)].map(c=>(
                    <button key={c} className={`chip ${c===catFilter?'active':''}`} onClick={()=>setCatFilter(c)}>{c}</button>
                  ))}
                </div>
              </div>
            </div>

            {filtered.length === 0 ? (
              <div className="empty">
                <div className="glyph"><I name="expense" size={22}/></div>
                <h4>Aucune dépense{catFilter!=='Toutes'?` dans « ${catFilter} »` :' ce mois-ci'}</h4>
                <p>Saisis tes premières dépenses pour les voir apparaître ici.</p>
              </div>
            ) : (
              <div className="scroll-x">
                <table className="tx-table">
                  <thead><tr><th>Nom</th><th>Catégorie</th><th>Type</th><th>Date</th><th style={{textAlign:'right'}}>Montant</th><th>Statut</th><th style={{width:72}}></th></tr></thead>
                  <tbody>
                    {filtered.map(t => {
                      const cat = state.categories.find(c=>c.id===t.cat);
                      return (
                        <tr key={t.id}>
                          <td><div className="tx-name"><div className="tx-glyph" style={cat?{background:cat.color+'22',color:cat.color}:undefined}><I name={cat?.icon||'expense'} size={16}/></div>{t.name}</div></td>
                          <td><CategoryBadge category={cat}/></td>
                          <td><span className={`badge ${t.type==='fixe'?'ok':'neutral'}`}>{t.type==='fixe'?'Fixe':'Variable'}</span></td>
                          <td style={{color:'var(--text-2)'}}>{t.date}</td>
                          <td className="tx-amount out" style={{textAlign:'right'}}>{fmtEUR(t.amount,{sign:true})}</td>
                          <td><StatusBadge status={t.status}/></td>
                          <td>
                            <div className="row-actions" style={{opacity:1}}>
                              <button className="row-btn" onClick={()=>openForm('expense',t)} title="Modifier"><I name="edit" size={14}/></button>
                              <button className="row-btn del" onClick={()=>handleDelete(t)} title="Supprimer"><I name="trash" size={14}/></button>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════
       PAGE — TRANSACTIONS
       ═══════════════════════════════════════════════════ */
    const Transactions = ({ state, dispatch, openForm, askConfirm, toast }) => {
      const mk  = state.selectedMonth;
      const all = state.transactions.filter(t => t.mk === mk);
      const [q,   setQ]   = useState('');
      const [statusF, setStatusF] = useState('Tous');
      const filtered = all.filter(t => {
        if (q && !t.name.toLowerCase().includes(q.toLowerCase())) return false;
        if (statusF !== 'Tous' && t.status !== statusF.toLowerCase()) return false;
        return true;
      });
      const inTotal  = filtered.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
      const outTotal = filtered.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);

      const handleDelete = (t) => askConfirm(t.name, () => {
        dispatch({type:'DELETE_TRANSACTION', id:t.id});
        toast('Transaction supprimée');
      });

      return (
        <div className="main-col" style={{gridColumn:'1/-1'}}>
          <div className="page-header">
            <div><EditableTitle pageId="transactions" defaultLabel="Transactions" state={state} dispatch={dispatch}/><div className="sub">Historique complet — {mkLabel(mk)}</div></div>
            <div style={{display:'flex',gap:10}}>
              <Button variant="secondary" leftIcon="plus" onClick={()=>openForm('income')}>Revenu</Button>
              <Button variant="primary"   leftIcon="plus" onClick={()=>openForm('expense')}>Dépense</Button>
            </div>
          </div>

          <div className="stat-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
            <StatCard icon="transactions" value={`${all.length}`}   label="Opérations ce mois"  delta={`${filtered.length} affichées`} deltaTone="neu"/>
            <StatCard icon="income"       value={fmtEUR(inTotal)}   label="Total entrées"        delta="entrées" deltaTone="pos"/>
            <StatCard icon="expense"      value={fmtEUR(outTotal)}  label="Total sorties"        delta="dépenses" deltaTone="neu"/>
          </div>

          <div className="card">
            <div className="card-title-row" style={{flexWrap:'wrap',gap:12}}>
              <div className="search" style={{flex:'0 1 300px',marginLeft:0,background:'var(--card-soft)'}}>
                <I name="search" size={16} color="#6F7D78"/>
                <input placeholder="Rechercher…" value={q} onChange={e=>setQ(e.target.value)}/>
              </div>
              <div style={{display:'flex',gap:8}}>
                <Segment items={[{value:'Tous',label:'Tous'},{value:'ok',label:'Validés'},{value:'wait',label:'En attente'},{value:'fail',label:'Échoués'}]} value={statusF} onChange={setStatusF}/>
              </div>
            </div>

            {filtered.length === 0 ? (
              <div className="empty">
                <div className="glyph"><I name="transactions" size={22}/></div>
                <h4>Aucune transaction trouvée</h4>
                <p>{q ? 'Aucun résultat pour cette recherche.' : 'Aucune transaction ce mois-ci.'}</p>
              </div>
            ) : (
              <div className="scroll-x">
                <table className="tx-table">
                  <thead><tr><th>Nom</th><th>Catégorie</th><th>Date</th><th>Note</th><th style={{textAlign:'right'}}>Montant</th><th>Statut</th><th style={{width:72}}></th></tr></thead>
                  <tbody>
                    {filtered.map(t => {
                      const cat = state.categories.find(c=>c.id===t.cat);
                      return (
                        <tr key={t.id}>
                          <td><div className="tx-name"><div className="tx-glyph" style={cat?{background:cat.color+'22',color:cat.color}:undefined}><I name={t.amount>0?'income':(cat?.icon||'expense')} size={16}/></div>{t.name}</div></td>
                          <td><CategoryBadge category={cat} isIncome={t.amount>0}/></td>
                          <td style={{color:'var(--text-2)'}}>{t.date}</td>
                          <td style={{color:'var(--text-2)',fontSize:13}}>{t.note||'—'}</td>
                          <td className={`tx-amount ${t.amount>0?'in':'out'}`} style={{textAlign:'right'}}>{fmtEUR(t.amount,{sign:true})}</td>
                          <td><StatusBadge status={t.status}/></td>
                          <td>
                            <div className="row-actions" style={{opacity:1}}>
                              {t.amount<0 && <button className="row-btn" onClick={()=>openForm('expense',t)} title="Modifier"><I name="edit" size={14}/></button>}
                              <button className="row-btn del" onClick={()=>handleDelete(t)} title="Supprimer"><I name="trash" size={14}/></button>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════
       PAGE — BUDGETS
       ═══════════════════════════════════════════════════ */
    const BudgetCardDetailed = ({ b, onEdit, dispatch, toast }) => {
      const pct     = Math.min(100, Math.round((b.current/b.goal)*100));
      const missing = Math.max(0, b.goal - b.current);
      const done    = b.current >= b.goal;
      const [customAmt, setCustomAmt] = useState(50);

      return (
        <div className="bp-card" style={{padding:22,gap:14}}>
          <div className="bp-head">
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div className="stat-ico"><I name={b.icon||'target'} size={18}/></div>
              <div>
                <div className="bp-title">{b.name}</div>
                <div style={{fontSize:12,color:'var(--text-2)',marginTop:2}}>{b.due?`Objectif ${b.due}`:'Sans échéance'}</div>
              </div>
            </div>
            <button className="icon-btn" style={{width:32,height:32}} onClick={onEdit}><I name="edit" size={14}/></button>
          </div>

          <div>
            <div className="bp-amount tnum">{fmtEUR(b.current)} <span className="bp-of tnum">/ {fmtEUR(b.goal)}</span></div>
            <div style={{fontSize:12.5,color:done?'var(--green-pos)':'var(--text-2)',marginTop:2,fontWeight:500}}>
              {done ? '🎉 Objectif atteint !' : `Encore ${fmtEUR(missing)} à épargner`}
            </div>
          </div>

          <div className="bp-progress"><span style={{width:`${pct}%`,background:done?'var(--green-pos)':'var(--green-800)'}}/></div>

          <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            <input
              type="number" className="input" style={{width:80,padding:'6px 10px',fontSize:13,textAlign:'right'}}
              value={customAmt} min={1}
              onChange={e=>setCustomAmt(Math.max(1,+e.target.value||1))}
            />
            <Button variant="accent"     size="sm" leftIcon="plus"  onClick={()=>{dispatch({type:'BUDGET_ADJUST',id:b.id,delta:+customAmt});toast(`+${fmtEUR(customAmt)} ajoutés à ${b.name}`);}}>Ajouter</Button>
            <Button variant="secondary"  size="sm" leftIcon="minus" onClick={()=>{dispatch({type:'BUDGET_ADJUST',id:b.id,delta:-customAmt});toast(`${fmtEUR(customAmt)} retirés de ${b.name}`);}}>Retirer</Button>
            <span className={`bp-priority ${done ? 'done' : b.priority}`} style={{marginLeft:'auto'}}>
              {done ? 'Objectif atteint ✓' : b.priority==='high'?'Priorité':b.priority==='med'?'Important':'Souple'}
            </span>
          </div>
        </div>
      );
    };

    const Budgets = ({ state, dispatch, toast, askConfirm }) => {
      const [editing,      setEditing]      = useState(null);
      const [archivedOpen, setArchivedOpen] = useState(false);
      const [transferOpen, setTransferOpen] = useState(false);
      const [tfFrom, setTfFrom] = useState('');
      const [tfTo,   setTfTo]   = useState('');
      const [tfAmt,  setTfAmt]  = useState(100);

      const totalGoal    = state.budgets.reduce((s,b)=>s+b.goal,0);
      const totalCurrent = state.budgets.reduce((s,b)=>s+b.current,0);
      const totalPct     = Math.round((totalCurrent/totalGoal)*100)||0;

      const saveEditing = () => {
        if (!editing.name || editing.goal<=0) return;
        dispatch({type:'BUDGET_SAVE', b:editing});
        toast(editing.id ? 'Budget modifié' : 'Budget créé');
        setEditing(null);
      };
      const deleteEditing = () => {
        askConfirm(editing.name, () => {
          dispatch({type:'BUDGET_DELETE', id:editing.id});
          toast('Budget supprimé');
        });
        setEditing(null);
      };
      const doTransfer = () => {
        if (!tfFrom || !tfTo || tfFrom===tfTo || tfAmt<=0) return;
        dispatch({type:'BUDGET_TRANSFER', fromId:tfFrom, toId:tfTo, amount:+tfAmt});
        toast(`${fmtEUR(tfAmt)} transférés`);
        setTransferOpen(false);
      };

      return (
        <div className="main-col" style={{gridColumn:'1/-1'}}>
          <div className="page-header">
            <div><EditableTitle pageId="budgets" defaultLabel="Budgets" state={state} dispatch={dispatch}/><div className="sub">Tes enveloppes et objectifs d'épargne</div></div>
            <div style={{display:'flex',gap:10}}>
              <Button variant="secondary" leftIcon="split" onClick={()=>setTransferOpen(true)}>Transférer</Button>
              <Button variant="primary"   leftIcon="plus"  onClick={()=>setEditing({id:null,name:'',goal:500,current:0,priority:'med',icon:'target',due:''})}>Nouveau budget</Button>
            </div>
          </div>

          {/* Summary banner */}
          <div className="card" style={{background:'linear-gradient(135deg,#EAF8E2 0%,#F6F8F4 100%)',borderColor:'transparent'}}>
            <div style={{display:'grid',gridTemplateColumns:'1.2fr 1fr 1fr 1fr',gap:28,alignItems:'center'}}>
              <div>
                <div style={{fontSize:12.5,color:'var(--text-2)',fontWeight:600,marginBottom:4}}>PROGRESSION GLOBALE</div>
                <div style={{fontSize:32,fontWeight:700,letterSpacing:'-.02em'}} className="tnum">
                  {fmtEUR(totalCurrent)} <span style={{fontSize:16,color:'var(--text-2)',fontWeight:500}}>/ {fmtEUR(totalGoal)}</span>
                </div>
                <div className="bp-progress" style={{marginTop:12,background:'rgba(15,51,43,.08)'}}>
                  <span style={{width:`${totalPct}%`}}/>
                </div>
              </div>
              {[
                {label:'Budgets actifs',  val:state.budgets.length},
                {label:'Objectifs atteints', val:state.budgets.filter(b=>b.current>=b.goal).length},
                {label:'Manque global',   val:fmtEUR(totalGoal-totalCurrent)},
              ].map(x=>(
                <div key={x.label}>
                  <div style={{fontSize:12.5,color:'var(--text-2)',fontWeight:600}}>{x.label}</div>
                  <div style={{fontSize:24,fontWeight:700}} className="tnum">{x.val}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Budget cards grid */}
          {(() => {
            const active   = state.budgets.filter(b => b.current < b.goal);
            const achieved = state.budgets.filter(b => b.current >= b.goal);
            return (<>
              {state.budgets.length === 0 ? (
                <div className="card"><div className="empty"><div className="glyph"><I name="budgets" size={22}/></div><h4>Aucun budget</h4><p>Crée ton premier budget pour commencer à épargner.</p></div></div>
              ) : (
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
                  {active.map(b=>(
                    <BudgetCardDetailed key={b.id} b={b} dispatch={dispatch} toast={toast} onEdit={()=>setEditing({...b})}/>
                  ))}
                </div>
              )}

              {/* Section objectifs atteints */}
              {achieved.length > 0 && (
                <div style={{marginTop:8}}>
                  <button
                    onClick={()=>setArchivedOpen(o=>!o)}
                    style={{display:'flex',alignItems:'center',gap:10,background:'none',border:'none',cursor:'pointer',padding:'10px 0',width:'100%'}}
                  >
                    <div style={{flex:1,height:1,background:'var(--border)'}}/>
                    <span style={{fontSize:13,fontWeight:600,color:'var(--text-2)',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:6}}>
                      <I name={archivedOpen?'chevron-up':'chevron-down'} size={13}/>
                      {achieved.length} objectif{achieved.length>1?'s':''} atteint{achieved.length>1?'s':''}
                    </span>
                    <div style={{flex:1,height:1,background:'var(--border)'}}/>
                  </button>
                  {archivedOpen && (
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16,marginTop:8,opacity:.72}}>
                      {achieved.map(b=>(
                        <BudgetCardDetailed key={b.id} b={b} dispatch={dispatch} toast={toast} onEdit={()=>setEditing({...b})}/>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </>);
          })()}

          {/* Edit / create modal */}
          <Modal open={!!editing} onClose={()=>setEditing(null)}
            title={editing?.id ? 'Modifier le budget' : 'Nouveau budget'}
            footer={<>
              {editing?.id && <Button variant="danger" leftIcon="trash" onClick={deleteEditing}>Supprimer</Button>}
              <Button variant="ghost" onClick={()=>setEditing(null)}>Annuler</Button>
              <Button variant="primary" leftIcon="save" onClick={saveEditing}>Enregistrer</Button>
            </>}
          >
            {editing && <>
              <Field label="Nom du budget"><Input value={editing.name} onChange={e=>setEditing({...editing,name:e.target.value})} placeholder="Ex. Vacances été" autoFocus/></Field>
              <div className="grid-2">
                <Field label="Objectif (€)"><Input type="number" value={editing.goal} onChange={e=>setEditing({...editing,goal:+e.target.value})}/></Field>
                <Field label="Montant actuel (€)"><Input type="number" value={editing.current} onChange={e=>setEditing({...editing,current:+e.target.value})}/></Field>
              </div>
              <div className="grid-2">
                <Field label="Priorité">
                  <Select value={editing.priority} onChange={e=>setEditing({...editing,priority:e.target.value})}>
                    <option value="high">Priorité haute</option>
                    <option value="med">Important</option>
                    <option value="low">Souple</option>
                  </Select>
                </Field>
                <Field label="Date cible (optionnel)"><Input value={editing.due||''} onChange={e=>setEditing({...editing,due:e.target.value})} placeholder="Juil. 2026"/></Field>
              </div>
            </>}
          </Modal>

          {/* Transfer modal */}
          <Modal open={transferOpen} onClose={()=>setTransferOpen(false)} title="Transférer entre budgets"
            footer={<>
              <Button variant="ghost" onClick={()=>setTransferOpen(false)}>Annuler</Button>
              <Button variant="primary" leftIcon="split" onClick={doTransfer}>Confirmer le transfert</Button>
            </>}
          >
            <div className="grid-2">
              <Field label="De">
                <Select value={tfFrom} onChange={e=>setTfFrom(e.target.value)}>
                  <option value="">— Choisir —</option>
                  {state.budgets.map(b=><option key={b.id} value={b.id}>{b.name} ({fmtEUR(b.current)})</option>)}
                </Select>
              </Field>
              <Field label="Vers">
                <Select value={tfTo} onChange={e=>setTfTo(e.target.value)}>
                  <option value="">— Choisir —</option>
                  {state.budgets.filter(b=>b.id!==tfFrom).map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
                </Select>
              </Field>
            </div>
            <Field label="Montant (€)"><Input type="number" value={tfAmt} min={1} onChange={e=>setTfAmt(+e.target.value)}/></Field>
            <div style={{fontSize:13,color:'var(--text-2)',padding:'10px 12px',background:'var(--green-50)',borderRadius:12}}>
              Les transferts ne modifient pas ton épargne totale.
            </div>
          </Modal>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════
       PAGE — RÉPARTITION
       ═══════════════════════════════════════════════════ */
    const AllocatorRow = ({ icon, name, badge, current, goal, value, max, onChange }) => {
      const pct = Math.min(100, Math.round(((current+value)/goal)*100));
      return (
        <div className="alloc-row">
          <div className="alloc-row-info">
            <div className="stat-ico" style={{flexShrink:0}}><I name={icon||'target'} size={18}/></div>
            <div style={{minWidth:0}}>
              <div style={{fontWeight:600,fontSize:14.5,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{name}</div>
              <div style={{fontSize:12,color:'var(--text-2)'}}>{fmtEUR(current)} / {fmtEUR(goal)} · <span style={{color:'var(--green-800)',fontWeight:600}}>{badge}</span></div>
            </div>
          </div>
          <div className="alloc-row-slider">
            <div className="bp-progress" style={{marginBottom:8,height:6}}>
              <span style={{width:`${pct}%`}}/>
            </div>
            <input type="range" className="range" min={0} max={Math.max(max,value,50)} step={10}
              value={value} onChange={e=>onChange(+e.target.value)}/>
          </div>
          <div className="alloc-row-amount">
            <input type="number" className="input" style={{width:110,textAlign:'right',padding:'8px 10px',fontSize:14}}
              value={value} min={0} onChange={e=>onChange(Math.max(0,+e.target.value||0))}/>
            <span style={{fontSize:13,color:'var(--text-2)'}}>€</span>
          </div>
        </div>
      );
    };

    const Repartition = ({ state, dispatch, toast, askConfirm }) => {
      const surplus      = getRemainingMonthlySurplus(state); /* income − planned − already allocated */
      const alreadyAlloc = getAllocatedSurplus(state);
      const pastAllocs   = (state.surplusAllocations||[]).filter(e=>e.month===state.selectedMonth);
      const secB         = getSecBudget(state);
      const missingSec   = Math.max(0, state.securityGoal - (secB?.current||0));
      const secDone      = missingSec === 0 && (secB?.current||0) > 0;
      const otherBudgets = state.budgets.filter(b => b.id !== 'b1');
      const activeBudgets = otherBudgets.filter(b => b.current < b.goal);
      const doneBudgets   = otherBudgets.filter(b => b.current >= b.goal && b.goal > 0);

      const computeInitial = () => {
        let left = Math.max(0, surplus);
        const alloc = {};
        const toSec = secDone ? 0 : Math.min(missingSec, left);
        alloc.security = toSec;
        left -= toSec;
        const totalActiveMissing = activeBudgets.reduce((s,b)=>s+Math.max(0,b.goal-b.current),0);
        let assigned = 0, biggestId = null, biggestShare = -1;
        activeBudgets.forEach(b => {
          const miss  = Math.max(0, b.goal-b.current);
          const share = totalActiveMissing>0 ? Math.floor((miss/totalActiveMissing)*left) : 0;
          alloc[b.id] = share;
          assigned   += share;
          if (share > biggestShare) { biggestShare=share; biggestId=b.id; }
        });
        doneBudgets.forEach(b => { alloc[b.id] = 0; });
        const rem = left - assigned;
        if (biggestId && rem!==0) alloc[biggestId] += rem;
        else if (rem!==0 && !secDone) alloc.security += rem;
        return alloc;
      };

      const [alloc, setAlloc] = useState(computeInitial);
      const totalAlloc = Object.values(alloc).reduce((s,n)=>s+n,0);
      const remaining  = surplus - totalAlloc;

      const setVal = (key, v) => setAlloc(prev=>({...prev,[key]:Math.max(0,Math.round(v))}));

      const applyError = totalAlloc > surplus ? `Le montant réparti (${fmtEUR(totalAlloc)}) dépasse ton surplus disponible (${fmtEUR(surplus)}).` : null;

      const apply = () => {
        if (applyError) { toast(applyError, 'x'); return; }
        if (totalAlloc <= 0) { toast('Aucun montant à répartir.', 'x'); return; }
        dispatch({type:'APPLY_ALLOCATION', alloc});
        setAlloc({});
        toast('Répartition appliquée — budgets mis à jour ✓');
      };
      const reset = () => setAlloc(computeInitial());

      useEffect(()=>{ setAlloc(computeInitial()); }, [state.selectedMonth]);

      return (
        <div className="main-col" style={{gridColumn:'1/-1'}}>
          <div className="page-header">
            <div><EditableTitle pageId="repartition" defaultLabel="Répartition du surplus" state={state} dispatch={dispatch}/><div className="sub">Distribue ton reste disponible vers tes objectifs</div></div>
          </div>

          {/* Top 2-col */}
          <div className="rep-hero-grid" style={{display:'grid',gridTemplateColumns:'1.2fr 1fr',gap:16}}>
            {/* Surplus hero */}
            <div className="hero" style={{minHeight:180}}>
              <div className="hero-top">
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <div className="hero-glyph"><I name="wallet" size={20}/></div>
                  <div>
                    <div style={{fontSize:12.5,color:'rgba(255,255,255,.6)',fontWeight:500}}>SURPLUS DISPONIBLE</div>
                    <div style={{fontSize:13,fontWeight:500,color:'rgba(255,255,255,.7)'}}>
                      {alreadyAlloc > 0 ? `${fmtEUR(alreadyAlloc)} déjà répartis ce mois` : 'Après dépenses fixes'}
                    </div>
                  </div>
                </div>
              </div>
              <div className="hero-amount tnum" style={{marginTop:16}}>
                {surplus <= 0
                  ? <span style={{fontSize:28}}>{alreadyAlloc > 0 ? 'Entièrement réparti' : 'Aucun surplus'}</span>
                  : fmtEUR(surplus)}
              </div>
              <div style={{fontSize:12.5,color:'rgba(255,255,255,.55)',marginTop:4}}>
                {fmtEUR(getAvailableIncome(state))} revenus − {fmtEUR(getPlannedTotal(state))} réservés
                {alreadyAlloc > 0 && <> − {fmtEUR(alreadyAlloc)} alloués</>}
              </div>
              <div className="hero-bottom">
                <div style={{fontSize:13.5,color:applyError?'#F36F6F':'white',fontWeight:600}}>
                  {applyError
                    ? `⚠ ${applyError}`
                    : remaining===0
                      ? '✓ Surplus entièrement réparti'
                      : remaining>0
                        ? `Reste ${fmtEUR(remaining)} à répartir`
                        : `⚠ Tu dépasses de ${fmtEUR(Math.abs(remaining))}`}
                </div>
                <div className="hero-pct" style={{background:remaining===0?'rgba(184,242,139,.18)':applyError?'rgba(243,111,111,.25)':'rgba(255,255,255,.12)'}}>
                  {surplus>0 ? Math.round((totalAlloc/surplus)*100) : 0}%
                </div>
              </div>
            </div>

            {/* Recommendation */}
            <div className="card" style={{background:'var(--green-100)',borderColor:'transparent'}}>
              <div style={{display:'flex',gap:12,marginBottom:12}}>
                <div className="stat-ico" style={{background:'white'}}><I name="sparkles" size={18}/></div>
                <div>
                  <div className="card-title">Recommandation</div>
                  <div className="card-sub">Basée sur tes priorités</div>
                </div>
              </div>
              <p style={{margin:'0 0 14px',fontSize:14,lineHeight:1.55,color:'var(--green-900)'}}>
                {surplus <= 0
                  ? <>Pas de surplus disponible. Vérifie que tes revenus sont saisis et que tes dépenses fixes ne dépassent pas ton revenu.</>
                  : missingSec > 0
                    ? <>Ton épargne de sécurité n'est pas complète. On suggère d'y placer <b>{fmtEUR(Math.min(missingSec,surplus))}</b> en priorité, puis de distribuer le reste.</>
                    : <>Sécurité complète ✓ Distribue ton surplus librement sur tes objectifs personnels.</>}
              </p>
              {surplus > 0 && <Button variant="primary" size="sm" leftIcon="sparkles" onClick={reset}>Utiliser la suggestion</Button>}
            </div>
          </div>

          {/* Allocator */}
          {surplus > 0 ? (
            <div className="card">
              <div className="card-title-row">
                <div><div className="card-title">Ta répartition</div><div className="card-sub">Ajuste librement chaque montant</div></div>
                <Button variant="ghost" size="sm" onClick={reset}>Réinitialiser</Button>
              </div>

              {!secDone && (
                <AllocatorRow
                  icon="shield-check" name="Budget sécurité" badge="Priorité 1"
                  current={secB?.current||0} goal={state.securityGoal}
                  value={alloc.security||0} max={Math.min(missingSec,surplus)}
                  onChange={v=>setVal('security',v)}
                />
              )}
              {activeBudgets.map(b=>(
                <AllocatorRow key={b.id}
                  icon={b.icon||'target'} name={b.name}
                  badge={b.priority==='high'?'Priorité':b.priority==='med'?'Important':'Souple'}
                  current={b.current} goal={b.goal}
                  value={alloc[b.id]||0} max={Math.max(0,b.goal-b.current)}
                  onChange={v=>setVal(b.id,v)}
                />
              ))}
              {(secDone || doneBudgets.length > 0) && (
                <div style={{marginTop:16,paddingTop:16,borderTop:'1px solid var(--border)'}}>
                  <div style={{fontSize:12,fontWeight:600,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--text-3)',marginBottom:10}}>Objectifs atteints</div>
                  {secDone && (
                    <div style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',opacity:.7}}>
                      <div className="stat-ico" style={{width:32,height:32}}><I name="shield-check" size={16}/></div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:600}}>Budget sécurité</div>
                        <div style={{fontSize:12,color:'var(--green-pos)'}}>{fmtEUR(secB?.current||0)} / {fmtEUR(state.securityGoal)} — Objectif atteint ✓</div>
                      </div>
                    </div>
                  )}
                  {doneBudgets.map(b=>(
                    <div key={b.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',opacity:.7}}>
                      <div className="stat-ico" style={{width:32,height:32}}><I name={b.icon||'target'} size={16}/></div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:600}}>{b.name}</div>
                        <div style={{fontSize:12,color:'var(--green-pos)'}}>{fmtEUR(b.current)} / {fmtEUR(b.goal)} — Objectif atteint ✓</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:22,paddingTop:18,borderTop:'1px solid var(--border)'}}>
                <div>
                  <div style={{fontSize:13,color:'var(--text-2)',fontWeight:500}}>Total réparti</div>
                  <div style={{fontSize:24,fontWeight:700,letterSpacing:'-.02em'}} className="tnum">
                    {fmtEUR(totalAlloc)} <span style={{fontSize:14,color:'var(--text-2)',fontWeight:500}}>/ {fmtEUR(surplus)}</span>
                  </div>
                </div>
                <div style={{display:'flex',gap:10}}>
                  <Button variant="ghost" onClick={reset}>Annuler</Button>
                  <Button variant="primary" leftIcon="check" disabled={!!applyError||surplus<=0||totalAlloc<=0} onClick={apply}>Valider la répartition</Button>
                </div>
              </div>
            </div>
          ) : (
            <div className="card"><div className="empty"><div className="glyph"><I name="wallet" size={22}/></div><h4>Aucun surplus disponible</h4><p>Saisis tes revenus et vérifie que tes dépenses fixes ne dépassent pas ton revenu net.</p></div></div>
          )}

          {/* ── Historique des répartitions ── */}
          {pastAllocs.length > 0 && (
            <div className="card">
              <div className="card-title-row">
                <div>
                  <div className="card-title">Répartitions effectuées</div>
                  <div className="card-sub">{mkLabel(state.selectedMonth)} · {pastAllocs.length} répartition{pastAllocs.length>1?'s':''}</div>
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {[...pastAllocs].reverse().map(entry => {
                  const budgetName = k => {
                    if (k==='security') return 'Sécurité';
                    return (state.budgets.find(b=>b.id===k)||{}).name || k;
                  };
                  const tags = Object.entries(entry.alloc).filter(([,v])=>v>0);
                  const d = new Date(entry.createdAt);
                  const dateStr = d.toLocaleDateString('fr-FR',{day:'numeric',month:'long'}) + ' à ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
                  return (
                    <div key={entry.id} style={{display:'flex',alignItems:'flex-start',gap:12,padding:'14px 16px',background:'var(--card-soft)',borderRadius:14}}>
                      <div className="stat-ico" style={{width:34,height:34,borderRadius:10,flexShrink:0,marginTop:2}}><I name="history" size={15}/></div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                          <span style={{fontWeight:700,fontSize:14}}>{fmtEUR(entry.amount)}</span>
                          <span style={{fontSize:12,color:'var(--text-3)'}}>répartis le {dateStr}</span>
                        </div>
                        <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                          {tags.map(([k,v])=>(
                            <span key={k} style={{fontSize:12,padding:'2px 9px',borderRadius:20,background:'var(--green-100)',color:'var(--green-900)',fontWeight:500}}>
                              {budgetName(k)} · {fmtEUR(v)}
                            </span>
                          ))}
                        </div>
                      </div>
                      <button
                        className="row-btn del"
                        title="Annuler cette répartition"
                        onClick={()=>askConfirm(`répartition de ${fmtEUR(entry.amount)}`, ()=>{
                          dispatch({type:'REVERT_ALLOCATION', id:entry.id});
                          toast('Répartition annulée — budgets restaurés');
                        })}
                        style={{flexShrink:0,marginTop:2}}
                      >
                        <I name="x" size={13}/>
                      </button>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════
       PAGE — ANALYSE
       ═══════════════════════════════════════════════════ */
    const Analyse = ({ state, dispatch }) => {
      const [range, setRange] = useState('12m');
      const mk       = state.selectedMonth;
      const cf       = getCashflow(state);
      const cfData   = range==='3m' ? cf.slice(-3) : range==='6m' ? cf.slice(-6) : cf;
      const cats     = getCatAmounts(state);
      const totalCat = cats.reduce((s,c)=>s+c.amount,0);
      const fixedExp = state.transactions.filter(t=>t.mk===mk&&t.amount<0&&t.type==='fixe').reduce((s,t)=>s+Math.abs(t.amount),0);
      const varExp   = state.transactions.filter(t=>t.mk===mk&&t.amount<0&&t.type==='variable').reduce((s,t)=>s+Math.abs(t.amount),0);
      const surplusSeries = cf.map(c=>c.in-c.out);
      const months        = cf.map(c=>c.m);
      const secB          = getSecBudget(state);
      const secPct        = Math.min(100,Math.round(((secB?.current||0)/state.securityGoal)*100));

      return (
        <div className="main-col" style={{gridColumn:'1/-1'}}>
          <div className="page-header">
            <div><EditableTitle pageId="analyse" defaultLabel="Analyse" state={state} dispatch={dispatch}/><div className="sub">Tendances et évolution de tes finances</div></div>
            <Segment items={[{value:'12m',label:'12 mois'},{value:'6m',label:'6 mois'},{value:'3m',label:'3 mois'}]} value={range} onChange={setRange}/>
          </div>

          {/* Cashflow */}
          <div className="card">
            <div className="card-title-row">
              <div><div className="card-title">Flux mensuels</div><div className="card-sub">Évolution sur {range}</div></div>
              <div className="legend">
                <span className="legend-item"><span className="legend-dot" style={{background:'#174C3F'}}/>Entrées</span>
                <span className="legend-item"><span className="legend-dot" style={{background:'#B8F28B'}}/>Dépenses</span>
              </div>
            </div>
            <CashflowChart data={cfData}/>
          </div>

          <div className="grid-2">
            {/* Surplus evolution */}
            <div className="card">
              <div className="card-title-row">
                <div><div className="card-title">Évolution du surplus</div><div className="card-sub">Reste à répartir chaque mois</div></div>
                <span className="badge ok"><span className="dot"/>{fmtEUR(surplusSeries[surplusSeries.length-1])}</span>
              </div>
              <Sparkline data={surplusSeries} months={months} color="#174C3F" fill="rgba(184,242,139,0.3)"/>
            </div>

            {/* Security progress */}
            <div className="card">
              <div className="card-title-row">
                <div><div className="card-title">Évolution budget sécurité</div><div className="card-sub">Vers {fmtEUR(state.securityGoal)}</div></div>
                <span className="badge ok"><span className="dot"/>{secPct}%</span>
              </div>
              <Sparkline
                data={[...Array(11).fill(0).map((_,i)=>(secB?.current||0)*(i+1)/12), secB?.current||0]}
                months={months}
                target={state.securityGoal}
                color="#65C96A" fill="rgba(101,201,106,.18)"
              />
            </div>
          </div>

          <div className="grid-2">
            {/* Categories */}
            <div className="card">
              <div className="card-title-row">
                <div><div className="card-title">Dépenses par catégorie</div><div className="card-sub">{mkLabel(mk)}</div></div>
              </div>
              {totalCat > 0 ? (
                <div style={{display:'flex',flexDirection:'column',gap:12}}>
                  {cats.filter(c=>c.amount>0).sort((a,b)=>b.amount-a.amount).map(c=>{
                    const pct = (c.amount/totalCat)*100;
                    return (
                      <div key={c.id}>
                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,fontSize:13.5}}>
                          <div style={{display:'flex',alignItems:'center',gap:8}}>
                            <span style={{width:10,height:10,borderRadius:3,background:c.color,display:'inline-block'}}/>
                            <span style={{fontWeight:500}}>{c.name}</span>
                          </div>
                          <span className="tnum" style={{color:'var(--text-2)'}}>{fmtPct(pct)} · {fmtEUR(c.amount)}</span>
                        </div>
                        <div className="bp-progress" style={{height:6}}>
                          <span style={{width:`${pct}%`,background:c.color}}/>
                        </div>
                      </div>
                    );
                  })}
                </div>
              ) : (
                <div className="empty" style={{padding:'20px 0'}}><p>Aucune dépense ce mois-ci.</p></div>
              )}
            </div>

            {/* Fixed vs variable */}
            <div className="card">
              <div className="card-title-row">
                <div><div className="card-title">Fixe vs variable</div><div className="card-sub">Structure de tes dépenses</div></div>
              </div>
              {(fixedExp+varExp) > 0 ? (
                <div style={{display:'flex',gap:18,alignItems:'center'}}>
                  <Donut
                    data={[{value:fixedExp,color:'#174C3F'},{value:varExp,color:'#B8F28B'}]}
                    centerLabel="Total" centerValue={fmtEUR(fixedExp+varExp)}
                  />
                  <div style={{flex:1,display:'flex',flexDirection:'column',gap:16}}>
                    {[{label:'Fixes',color:'#174C3F',val:fixedExp,sub:'Loyer, factures, abonnements'},
                      {label:'Variables',color:'#B8F28B',val:varExp,sub:'Sorties, courses, plaisirs'}].map(r=>(
                      <div key={r.label}>
                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                          <span style={{display:'flex',alignItems:'center',gap:8,fontWeight:600}}>
                            <span style={{width:10,height:10,borderRadius:3,background:r.color,display:'inline-block'}}/>
                            {r.label}
                          </span>
                          <span className="tnum" style={{fontWeight:600}}>{fmtEUR(r.val)}</span>
                        </div>
                        <div style={{fontSize:12.5,color:'var(--text-2)'}}>{r.sub}</div>
                      </div>
                    ))}
                  </div>
                </div>
              ) : (
                <div className="empty" style={{padding:'20px 0'}}><p>Aucune dépense ce mois-ci.</p></div>
              )}
            </div>
          </div>

          {/* Goals */}
          <div className="card">
            <div className="card-title-row">
              <div><div className="card-title">Progression des objectifs</div><div className="card-sub">Tous tes budgets en un coup d'œil</div></div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:14}}>
              {state.budgets.map(b=><BudgetProgressCard key={b.id} b={b}/>)}
            </div>
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════
       PAGE — PARAMÈTRES
       ═══════════════════════════════════════════════════ */
    const Parametres = ({ state, dispatch, toast, askConfirm }) => {
      const [tab,          setTab]         = useState('general');
      const [secGoal,      setSecGoal]     = useState(state.securityGoal);
      const [userName,     setUserName]    = useState(state.userName);
      const [userInitials, setUserInit]    = useState(state.userInitials);
      const [reduceMotion, setReduceMotion]= useState(false);
      const [showCents,    setShowCents]   = useState(false);
      const [catEditing,   setCatEditing]  = useState(null);
      const [urssafAct,    setUrssafAct]   = useState(state.urssafActivityType || 'liberale_ssi');
      const [urssafCustom, setUrssafCustom]= useState(Math.round((state.urssafRate||0.256)*1000)/10);
      const CAT_COLORS = ['#174C3F','#65C96A','#B8F28B','#1F6655','#F6C766','#A8C9A1','#F36F6F','#6F7D78'];

      return (
        <div className="main-col" style={{gridColumn:'1/-1'}}>
          <div className="page-header">
            <div><EditableTitle pageId="parametres" defaultLabel="Paramètres" state={state} dispatch={dispatch}/><div className="sub">Configure ton application</div></div>
          </div>

          <Tabs
            items={[{value:'general',label:'Général'},{value:'urssaf',label:'URSSAF'},{value:'budgets',label:'Budgets'},{value:'categories',label:'Catégories'},{value:'affichage',label:'Affichage'},{value:'compte',label:'Compte'}]}
            value={tab} onChange={setTab}
          />

          {tab==='general' && (
            <div className="grid-2">
              <div className="card">
                <div className="card-title-row"><div className="card-title">Objectif de sécurité</div></div>
                <p style={{fontSize:13.5,color:'var(--text-2)',margin:'0 0 14px',lineHeight:1.5}}>
                  Combien dois-tu avoir de côté pour te sentir en sécurité ? On recommande l'équivalent de 3 mois de dépenses.
                </p>
                <Field label="Montant cible (€)"><Input type="number" value={secGoal} onChange={e=>setSecGoal(+e.target.value)}/></Field>
                <div style={{display:'flex',justifyContent:'flex-end',marginTop:16}}>
                  <Button variant="primary" onClick={()=>{dispatch({type:'SECURITY_GOAL',goal:secGoal});toast('Objectif de sécurité mis à jour');}}>Enregistrer</Button>
                </div>
              </div>
              <div className="card">
                <div className="card-title-row"><div className="card-title">Mois en cours</div></div>
                <p style={{fontSize:13.5,color:'var(--text-2)',margin:'0 0 14px',lineHeight:1.5}}>
                  Utilise les flèches <b>&lt; &gt;</b> dans l'en-tête pour naviguer entre les mois. Toutes les données filtrent automatiquement.
                </p>
                <div style={{padding:'12px 14px',background:'var(--green-100)',borderRadius:14,fontSize:14,color:'var(--green-900)',fontWeight:600}}>
                  Mois sélectionné : {mkLabel(state.selectedMonth)}
                </div>
              </div>
            </div>
          )}

          {tab==='urssaf' && (()=>{
            const previewRate = urssafAct==='custom' ? urssafCustom/100 : (URSSAF_ACTIVITIES.find(a=>a.value===urssafAct)?.rate ?? state.urssafRate);
            const saveUrssaf  = () => { dispatch({type:'SET_URSSAF_ACTIVITY', actType:urssafAct, rate: urssafAct==='custom' ? urssafCustom/100 : URSSAF_ACTIVITIES.find(a=>a.value===urssafAct)?.rate}); toast('Paramètres URSSAF enregistrés'); };
            return (
              <div className="grid-2">
                <div className="card">
                  <div className="card-title-row"><div className="card-title">Type d'activité</div></div>
                  <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
                    {URSSAF_ACTIVITIES.map(a=>(
                      <button key={a.value} onClick={()=>setUrssafAct(a.value)}
                        style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 14px',
                          borderRadius:14,border:`2px solid ${urssafAct===a.value?'var(--green-800)':'var(--border)'}`,
                          background:urssafAct===a.value?'var(--green-50)':'transparent',cursor:'pointer',textAlign:'left'}}>
                        <div>
                          <div style={{fontSize:13.5,fontWeight:urssafAct===a.value?700:500,color:urssafAct===a.value?'var(--green-800)':'var(--text)'}}>{a.label}</div>
                          {a.rate && <div style={{fontSize:12,color:'var(--text-3)',marginTop:2}}>{Math.round(a.rate*1000)/10} %</div>}
                        </div>
                        {urssafAct===a.value && <I name="check" size={16} color="var(--green-800)"/>}
                      </button>
                    ))}
                  </div>
                  {urssafAct==='custom' && (
                    <Field label="Taux personnalisé (%)">
                      <Input type="number" min={0} max={100} step={0.1} value={urssafCustom}
                        onChange={e=>setUrssafCustom(Math.max(0,Math.min(100,+e.target.value)))}/>
                    </Field>
                  )}
                  <div style={{display:'flex',justifyContent:'flex-end',marginTop:14}}>
                    <Button variant="primary" onClick={saveUrssaf}>Enregistrer</Button>
                  </div>
                </div>
                <div className="card">
                  <div className="card-title-row"><div className="card-title">Taux actuel</div></div>
                  <div style={{textAlign:'center',padding:'24px 0'}}>
                    <div style={{fontSize:48,fontWeight:800,color:'var(--green-800)',letterSpacing:'-.03em'}} className="tnum">
                      {Math.round(previewRate*1000)/10}<span style={{fontSize:24}}>%</span>
                    </div>
                    <div style={{fontSize:13,color:'var(--text-2)',marginTop:6}}>{URSSAF_ACTIVITIES.find(a=>a.value===urssafAct)?.label}</div>
                  </div>
                  <div style={{background:'var(--card-soft)',borderRadius:14,padding:'14px 16px',fontSize:13,color:'var(--text-2)',lineHeight:1.7}}>
                    <b>Exemple :</b> Pour un CA freelance de 2 000 €<br/>
                    → URSSAF : <b style={{color:'var(--red)'}}>{fmtEUR(Math.round(2000*previewRate))}</b><br/>
                    → Revenu net : <b style={{color:'var(--green-800)'}}>{fmtEUR(2000-Math.round(2000*previewRate))}</b>
                  </div>
                  <div style={{marginTop:12,fontSize:12,color:'var(--text-3)',lineHeight:1.6}}>
                    Taux 2026 en vigueur. Consulte l'URSSAF ou un comptable pour vérifier ton taux exact.
                  </div>
                </div>
              </div>
            );
          })()}

          {tab==='budgets' && (
            <div className="card">
              <div className="card-title-row">
                <div className="card-title">Budgets actifs</div>
                <Button variant="primary" size="sm" leftIcon="plus" onClick={()=>{}}>Gérer dans Budgets</Button>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {state.budgets.map(b=>(
                  <div key={b.id} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',background:'var(--card-soft)',borderRadius:16}}>
                    <div className="stat-ico" style={{width:36,height:36}}><I name={b.icon||'target'} size={16}/></div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:14}}>{b.name}</div>
                      <div style={{fontSize:12.5,color:'var(--text-2)'}}>{fmtEUR(b.current)} / {fmtEUR(b.goal)} · {b.priority==='high'?'Priorité':b.priority==='med'?'Important':'Souple'}</div>
                    </div>
                    <div className="bp-progress" style={{width:80,height:6}}>
                      <span style={{width:`${Math.min(100,Math.round(b.current/b.goal*100))}%`}}/>
                    </div>
                    <span style={{fontSize:12,fontWeight:700,color:'var(--green-800)',minWidth:36,textAlign:'right'}}>{Math.min(100,Math.round(b.current/b.goal*100))}%</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {tab==='categories' && (
            <div className="card">
              <div className="card-title-row">
                <div className="card-title">Catégories de dépenses</div>
                <Button variant="primary" size="sm" leftIcon="plus" onClick={()=>setCatEditing({id:null,name:'',color:CAT_COLORS[0],icon:'target'})}>Nouvelle</Button>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:10}}>
                {state.categories.map(c=>(
                  <div key={c.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',background:'var(--card-soft)',borderRadius:16}}>
                    <div style={{width:32,height:32,borderRadius:10,background:c.color+'22',color:c.color,display:'grid',placeItems:'center'}}><I name={c.icon||'target'} size={16}/></div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:13.5}}>{c.name}</div>
                      <div style={{fontSize:11.5,color:'var(--text-2)'}}>
                        {c.budget > 0 ? <span style={{color:'var(--green-800)',fontWeight:600}}>{fmtEUR(c.budget)}/mois</span> : <span>Aucun budget défini</span>}
                      </div>
                    </div>
                    <button className="row-btn" onClick={()=>setCatEditing({...c})} title="Modifier"><I name="edit" size={13}/></button>
                    <button className="row-btn del" onClick={()=>askConfirm(c.name,()=>{dispatch({type:'DELETE_CATEGORY',id:c.id});toast('Catégorie supprimée');})} title="Supprimer"><I name="trash" size={13}/></button>
                  </div>
                ))}
              </div>
              <Modal open={!!catEditing} onClose={()=>setCatEditing(null)}
                title={catEditing?.id?'Modifier la catégorie':'Nouvelle catégorie'}
                footer={<>
                  <Button variant="ghost" onClick={()=>setCatEditing(null)}>Annuler</Button>
                  <Button variant="primary" onClick={()=>{
                    if (!catEditing.name) return;
                    dispatch({type:catEditing.id?'EDIT_CATEGORY':'ADD_CATEGORY',cat:{...catEditing,budget:+(catEditing.budget||0)}});
                    toast(catEditing.id?'Catégorie modifiée':'Catégorie créée');
                    setCatEditing(null);
                  }}>Enregistrer</Button>
                </>}
              >
                {catEditing && <>
                  <Field label="Nom"><Input value={catEditing.name} onChange={e=>setCatEditing({...catEditing,name:e.target.value})} placeholder="Ex. Santé" autoFocus/></Field>
                  <Field label="Budget mensuel (€)">
                    <Input type="number" min={0} value={catEditing.budget||0} onChange={e=>setCatEditing({...catEditing,budget:Math.max(0,+e.target.value||0)})} placeholder="0"/>
                  </Field>
                  <Field label="Couleur">
                    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                      {CAT_COLORS.map(col=>(
                        <button key={col} onClick={()=>setCatEditing({...catEditing,color:col})}
                          style={{width:28,height:28,borderRadius:8,background:col,border:catEditing.color===col?'3px solid var(--green-900)':'3px solid transparent',cursor:'pointer'}}/>
                      ))}
                    </div>
                  </Field>
                </>}
              </Modal>
            </div>
          )}

          {tab==='affichage' && (
            <div className="card">
              <div className="card-title-row"><div className="card-title">Préférences d'affichage</div></div>
              <SettingRow title="Réduire les animations" desc="Désactive les transitions pour un rendu plus calme" checked={reduceMotion} onChange={setReduceMotion}/>
              <SettingRow title="Afficher les centimes"  desc="Affiche les montants à la virgule près" checked={showCents}    onChange={setShowCents}/>
              <SettingRow title="Mode sombre automatique" desc="Bascule en mode sombre la nuit (bientôt)" checked={false} onChange={()=>{}} disabled/>
            </div>
          )}

          {tab==='compte' && (
            <div className="grid-2">
              <div className="card">
                <div className="card-title-row"><div className="card-title">Profil</div></div>
                <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:18}}>
                  <div className="avatar" style={{width:64,height:64,fontSize:22}}>{userInitials}</div>
                  <div>
                    <div style={{fontSize:16,fontWeight:700}}>{userName}</div>
                    <div style={{fontSize:13,color:'var(--text-2)'}}>Compte personnel</div>
                  </div>
                </div>
                <Field label="Prénom"><Input value={userName} onChange={e=>setUserName(e.target.value)}/></Field>
                <Field label="Initiales (2 lettres)"><Input value={userInitials} maxLength={2} onChange={e=>setUserInit(e.target.value.toUpperCase())}/></Field>
                <div style={{display:'flex',justifyContent:'flex-end',marginTop:14}}>
                  <Button variant="primary" onClick={()=>{dispatch({type:'UPDATE_PROFILE',name:userName,initials:userInitials});toast('Profil mis à jour');}}>Enregistrer</Button>
                </div>
              </div>
              <div className="card">
                <div className="card-title-row"><div className="card-title">Données</div></div>
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  <Button variant="secondary" leftIcon="download" onClick={()=>{
                    const data = JSON.stringify(state,null,2);
                    const blob = new Blob([data],{type:'application/json'});
                    const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='budgetisation-backup.json'; a.click();
                    toast('Sauvegarde téléchargée ✓');
                  }}>Exporter mes données (JSON)</Button>
                  <Button variant="secondary" leftIcon="save" onClick={()=>{
                    const input = document.createElement('input');
                    input.type='file'; input.accept='.json,application/json';
                    input.onchange = (e) => {
                      const file = e.target.files[0];
                      if (!file) return;
                      const reader = new FileReader();
                      reader.onload = (ev) => {
                        try {
                          const data = JSON.parse(ev.target.result);
                          if (!data.budgets || !data.categories) { toast('Fichier invalide — données non reconnues.','x'); return; }
                          dispatch({type:'RESTORE_STATE', data});
                          toast('Données importées avec succès ✓');
                        } catch(err) { toast('Fichier invalide — format JSON attendu.','x'); }
                      };
                      reader.readAsText(file);
                    };
                    input.click();
                  }}>Importer des données (JSON)</Button>
                  <Button variant="danger" leftIcon="trash" onClick={()=>{
                    if (window.confirm('Réinitialiser toutes les données ? Cette action est irréversible.')) {
                      localStorage.removeItem('budgetisation');
                      window.location.reload();
                    }
                  }}>Réinitialiser les données</Button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════
       PAGE — URSSAF
       ═══════════════════════════════════════════════════ */
    const URSSAF_ACTIVITIES = [
      { value:'liberale_ssi',   label:'Profession libérale (SSI)',   rate:0.256 },
      { value:'liberale_cipav', label:'Profession libérale (CIPAV)', rate:0.232 },
      { value:'service_bic',    label:'Prestation de service (BIC)', rate:0.246 },
      { value:'custom',         label:'Taux personnalisé',           rate:null  },
    ];
    const URSSAF_STATUS_META = {
      a_prevoir:   { label:'À prévoir',    color:'#B97C0F',           bg:'var(--orange-soft)' },
      mis_de_cote: { label:'Mis de côté',  color:'var(--green-800)',  bg:'var(--green-100)'   },
      paye:        { label:'Payé ✓',       color:'#2e7d32',           bg:'#E8F5E9'            },
    };

    const Urssaf = ({ state, dispatch, openForm, navigate, toast }) => {
      const [urssafMode, setUrssafMode] = useState('mensuel');
      const mk      = state.selectedMonth;
      const year    = mk.split('-')[0];
      const rate    = state.urssafRate || 0.256;
      const actLabel = URSSAF_ACTIVITIES.find(a=>a.value===state.urssafActivityType)?.label || 'Profession libérale (SSI)';

      /* ── Quarterly helpers ── */
      const getQuarterNum  = (m) => Math.ceil(m / 3);
      const getQuarterMKs  = (yr, q) => { const s=(q-1)*3+1; return [s,s+1,s+2].map(m=>`${yr}-${String(m).padStart(2,'0')}`); };
      const currentQ       = getQuarterNum(parseInt(mk.split('-')[1]));
      const quarterMKs     = getQuarterMKs(year, currentQ);
      const qKey           = `${year}-Q${currentQ}`;

      /* Monthly values */
      const grossFl   = getGrossFreelance(state);
      const urssafAmt = getUrssafAmount(state);
      const netFl     = getNetFreelance(state);

      /* Quarterly values */
      const qGrossFl  = quarterMKs.reduce((s,m) => s + getGrossFreelance(state, m), 0);
      const qUrssaf   = Math.round(qGrossFl * rate);
      const qNet      = qGrossFl - qUrssaf;

      /* Active values */
      const activeGross  = urssafMode==='mensuel' ? grossFl  : qGrossFl;
      const activeUrssaf = urssafMode==='mensuel' ? urssafAmt : qUrssaf;
      const activeNet    = urssafMode==='mensuel' ? netFl    : qNet;
      const activeSK     = urssafMode==='mensuel' ? mk       : qKey;
      const curStatus    = (state.urssafStatuses||[]).find(u=>u.mk===activeSK)?.status || (activeGross>0?'a_prevoir':null);

      const setStatus = (s) => { dispatch({type:'SET_URSSAF_STATUS', mk:activeSK, status:s}); toast('Statut mis à jour'); };

      /* Period label */
      const periodLabel = urssafMode==='mensuel' ? mkLabel(mk) : `T${currentQ} ${year} (${quarterMKs.map(m=>MONTHS_SHORT[parseInt(m.split('-')[1])-1]).join('–')})`;

      /* Monthly history */
      const monthHistory = getLast12(mk)
        .map(({key,m}) => {
          const g  = getGrossFreelance(state, key);
          const u  = Math.round(g * rate);
          const st = (state.urssafStatuses||[]).find(x=>x.mk===key)?.status || (g>0?'a_prevoir':null);
          return { key, label:m, gross:g, urssaf:u, net:g-u, status:st, isCurrent:key===mk };
        })
        .filter(h => h.gross > 0 || h.isCurrent);

      /* Quarterly history — current year + prev year */
      const quarterHistory = (() => {
        const rows = [];
        [year, String(parseInt(year)-1)].forEach(yr => {
          [4,3,2,1].forEach(q => {
            const k   = `${yr}-Q${q}`;
            const mks = getQuarterMKs(yr, q);
            const g   = mks.reduce((s,m) => s + getGrossFreelance(state, m), 0);
            const u   = Math.round(g * rate);
            const st  = (state.urssafStatuses||[]).find(x=>x.mk===k)?.status || (g>0?'a_prevoir':null);
            if (g > 0 || (yr===year && q===currentQ)) {
              rows.push({ key:k, label:`T${q} ${yr}`, gross:g, urssaf:u, net:g-u, status:st, isCurrent:yr===year&&q===currentQ });
            }
          });
        });
        return rows;
      })();

      const history = urssafMode==='mensuel' ? monthHistory : quarterHistory;

      return (
        <div className="main-col" style={{gridColumn:'1/-1'}}>
          <div className="page-header">
            <div><EditableTitle pageId="urssaf" defaultLabel="URSSAF" state={state} dispatch={dispatch}/><div className="sub">Cotisations micro-entreprise — {periodLabel}</div></div>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <Segment items={[{value:'mensuel',label:'Mensuel'},{value:'trimestriel',label:'Trimestriel'}]} value={urssafMode} onChange={setUrssafMode}/>
              <Button variant="secondary" leftIcon="settings" onClick={()=>navigate('parametres')}>Configurer le taux</Button>
            </div>
          </div>

          {/* TOP ROW */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>

            {/* Summary card */}
            <div className="card" style={{padding:24}}>
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
                <div style={{width:40,height:40,borderRadius:14,background:'var(--orange-soft)',display:'grid',placeItems:'center',flexShrink:0}}>
                  <I name="percent" size={18} color="#B97C0F"/>
                </div>
                <div>
                  <div style={{fontWeight:700,fontSize:15}}>Estimation URSSAF</div>
                  <div style={{fontSize:12.5,color:'var(--text-2)'}}>{actLabel} · {Math.round(rate*1000)/10} %</div>
                </div>
              </div>

              {activeGross === 0 ? (
                <div className="empty" style={{padding:'12px 0'}}>
                  <div className="glyph"><I name="percent" size={22}/></div>
                  <h4>Aucun CA freelance {urssafMode==='mensuel'?'ce mois-ci':'ce trimestre'}</h4>
                  <p>Ajoute un revenu de type « Freelance » pour calculer automatiquement l'URSSAF estimée.</p>
                  <Button variant="primary" size="sm" leftIcon="plus" onClick={()=>openForm('income')}>Ajouter un revenu freelance</Button>
                </div>
              ) : (
                <>
                  <div style={{display:'flex',flexDirection:'column',gap:8}}>
                    {[
                      {label:`CA freelance${urssafMode==='trimestriel'?' (trimestre)':''}`, value:fmtEUR(activeGross), color:'var(--text)', bold:false},
                      {label:`Cotisations (${Math.round(rate*1000)/10} %)`, value:activeUrssaf>0?`− ${fmtEUR(activeUrssaf)}`:'0 €', color:'var(--red)', bold:false},
                      {label:'Revenu net disponible', value:fmtEUR(activeNet), color:'var(--green-800)', bold:true},
                    ].map(r=>(
                      <div key={r.label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',background:'var(--card-soft)',borderRadius:12}}>
                        <span style={{fontSize:13.5,color:'var(--text-2)'}}>{r.label}</span>
                        <span className="tnum" style={{fontSize:14,fontWeight:r.bold?700:600,color:r.color}}>{r.value}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{marginTop:16,padding:'12px 16px',background:'var(--card-soft)',borderRadius:14,fontSize:13,color:'var(--text-2)',lineHeight:1.7}}>
                    {fmtEUR(activeGross)} × {Math.round(rate*1000)/10} % = <b style={{color:'var(--text)'}}>{fmtEUR(activeUrssaf)}</b> de cotisations estimées.
                  </div>
                </>
              )}
            </div>

            {/* Status card */}
            <div className="card" style={{padding:24}}>
              <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>Statut — {urssafMode==='mensuel'?mkLabel(mk):`T${currentQ} ${year}`}</div>
              <div style={{fontSize:13,color:'var(--text-2)',marginBottom:18}}>
                {activeGross>0 ? `As-tu mis de côté les ${fmtEUR(activeUrssaf)} ?` : `Aucun CA freelance ${urssafMode==='mensuel'?'ce mois':'ce trimestre'}.`}
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {Object.entries({a_prevoir:'📋 À prévoir', mis_de_cote:'🏦 Mis de côté', paye:"✅ Payé à l'URSSAF"}).map(([val,label])=>(
                  <button key={val} disabled={activeGross===0} onClick={()=>setStatus(val)}
                    style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderRadius:14,
                      border:`2px solid ${curStatus===val?'var(--green-800)':'var(--border)'}`,
                      background:curStatus===val?'var(--green-50)':'transparent',
                      cursor:activeGross?'pointer':'default',opacity:activeGross?1:.45,
                      textAlign:'left',fontSize:13.5,fontWeight:curStatus===val?700:500,
                      color:curStatus===val?'var(--green-800)':'var(--text-2)',transition:'all .15s'}}>
                    {label}
                  </button>
                ))}
              </div>
              {activeGross > 0 && curStatus && (
                <div style={{marginTop:14,padding:'10px 14px',borderRadius:12,
                  background:URSSAF_STATUS_META[curStatus]?.bg,
                  color:URSSAF_STATUS_META[curStatus]?.color,
                  fontSize:13,fontWeight:600}}>
                  Statut actuel : {URSSAF_STATUS_META[curStatus]?.label}
                </div>
              )}
              {urssafMode==='trimestriel' && (
                <div style={{marginTop:12,padding:'10px 14px',borderRadius:12,background:'var(--card-soft)',fontSize:12,color:'var(--text-2)',lineHeight:1.5}}>
                  Déclaration trimestrielle : échéance en janvier, avril, juillet et octobre.
                </div>
              )}
            </div>
          </div>

          {/* HISTORIQUE */}
          <div className="card">
            <div className="card-title-row">
              <div>
                <div className="card-title">Historique URSSAF</div>
                <div className="card-sub">{urssafMode==='mensuel'?'Mois avec CA freelance':'Trimestres avec CA freelance'}</div>
              </div>
            </div>
            {history.filter(h=>h.gross>0).length === 0 ? (
              <div className="empty">
                <div className="glyph"><I name="history" size={22}/></div>
                <h4>Aucun historique</h4>
                <p>Les {urssafMode==='mensuel'?'mois':'trimestres'} avec du CA freelance apparaîtront ici automatiquement.</p>
              </div>
            ) : (
              <div className="scroll-x">
                <table className="tx-table">
                  <thead><tr>
                    <th>{urssafMode==='mensuel'?'Mois':'Trimestre'}</th>
                    <th style={{textAlign:'right'}}>Chiffre d'affaires</th>
                    <th style={{textAlign:'center'}}>Taux</th>
                    <th style={{textAlign:'right'}}>Cotisations</th>
                    <th style={{textAlign:'right'}}>Revenu net</th>
                    <th>Statut</th>
                  </tr></thead>
                  <tbody>
                    {history.filter(h=>h.gross>0).map(h=>(
                      <tr key={h.key} style={h.isCurrent?{background:'var(--green-50)'}:{}}>
                        <td>
                          <span style={{fontWeight:h.isCurrent?700:500}}>{h.label}</span>
