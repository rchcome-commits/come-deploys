                          {h.isCurrent && <span style={{marginLeft:8,fontSize:11,background:'var(--green-200)',color:'var(--green-900)',padding:'2px 7px',borderRadius:99,fontWeight:700}}>{urssafMode==='mensuel'?'CE MOIS':'CE TRIMESTRE'}</span>}
                        </td>
                        <td className="tnum" style={{textAlign:'right'}}>{fmtEUR(h.gross)}</td>
                        <td style={{textAlign:'center',color:'var(--text-2)',fontSize:13}}>{Math.round(rate*1000)/10} %</td>
                        <td className="tnum tx-amount out" style={{textAlign:'right'}}>{fmtEUR(h.urssaf)}</td>
                        <td className="tnum tx-amount in"  style={{textAlign:'right'}}>{fmtEUR(h.net)}</td>
                        <td>
                          <select style={{fontSize:12,border:'1px solid var(--border)',borderRadius:8,padding:'4px 8px',background:'transparent',color:'var(--text)',cursor:'pointer'}}
                            value={h.status||'a_prevoir'}
                            onChange={e=>{ dispatch({type:'SET_URSSAF_STATUS', mk:h.key, status:e.target.value}); toast('Statut mis à jour'); }}>
                            <option value="a_prevoir">À prévoir</option>
                            <option value="mis_de_cote">Mis de côté</option>
                            <option value="paye">Payé ✓</option>
                          </select>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════
       STEP 9 — Reducer complet + Formulaires + App root
       ═══════════════════════════════════════════════════ */
    function appReducer(s, a) {
      switch(a.type) {
        case 'PAGE': return {...s, page: a.page};
        case 'SET_MONTH': return {...s, selectedMonth: a.key};

        case 'ADD_INCOME': {
          const item = {id: genId(), ...a.payload};
          const tx = {id: item.id, name: item.name, cat: null, date: item.date,
                      mk: item.mk, amount: item.amount, note: item.note,
                      status: 'ok', type: 'fixe', method: 'Virement'};
          return {...s, incomesList: [item, ...s.incomesList], transactions: [tx, ...s.transactions]};
        }
        case 'EDIT_INCOME': {
          const p = a.payload;
          return {
            ...s,
            incomesList:  s.incomesList.map(i => i.id===p.id ? {...i, ...p} : i),
            transactions: s.transactions.map(t => t.id===p.id
              ? {...t, name:p.name, amount:p.amount, date:p.date, note:p.note, mk:p.mk} : t),
          };
        }
        case 'DELETE_INCOME':
          return {...s,
            incomesList:  s.incomesList.filter(i => i.id !== a.id),
            transactions: s.transactions.filter(t => t.id !== a.id),
          };

        case 'ADD_EXPENSE': {
          const item = {id: genId(), ...a.payload, amount: -Math.abs(a.payload.amount)};
          return {...s, transactions: [item, ...s.transactions]};
        }
        case 'EDIT_TRANSACTION': {
          const p = a.payload;
          return {...s, transactions: s.transactions.map(t => t.id===p.id
            ? {...t, ...p, amount: p.amount < 0 ? p.amount : -Math.abs(p.amount)} : t)};
        }
        case 'DELETE_TRANSACTION':
          return {...s, transactions: s.transactions.filter(t => t.id !== a.id)};

        case 'BUDGET_SAVE': {
          const b = a.b;
          if (b.id) return {...s, budgets: s.budgets.map(x => x.id===b.id ? b : x)};
          return {...s, budgets: [...s.budgets, {...b, id: genId()}]};
        }
        case 'BUDGET_DELETE':
          return {...s, budgets: s.budgets.filter(b => b.id !== a.id)};
        case 'BUDGET_ADJUST':
          return {...s, budgets: s.budgets.map(b =>
            b.id===a.id ? {...b, current: Math.max(0, b.current + a.delta)} : b)};
        case 'BUDGET_TRANSFER':
          return {...s, budgets: s.budgets.map(b => {
            if (b.id===a.fromId) return {...b, current: Math.max(0, b.current - a.amount)};
            if (b.id===a.toId)   return {...b, current: b.current + a.amount};
            return b;
          })};

        case 'APPLY_ALLOCATION': {
          const totalAllocated = Object.values(a.alloc).reduce((sum, v) => sum + (v || 0), 0);
          const allocEntry = {
            id: genId('sa'),
            month: s.selectedMonth,
            alloc: a.alloc,
            amount: totalAllocated,
            createdAt: new Date().toISOString(),
          };
          return {
            ...s,
            budgets: s.budgets.map(b => {
              const amt = (b.id === 'b1' ? a.alloc['security'] : a.alloc[b.id]) || 0;
              return amt > 0 ? {...b, current: b.current + amt} : b;
            }),
            surplusAllocations: [...(s.surplusAllocations || []), allocEntry],
          };
        }

        case 'REVERT_ALLOCATION': {
          const entry = (s.surplusAllocations || []).find(e => e.id === a.id);
          if (!entry) return s;
          return {
            ...s,
            budgets: s.budgets.map(b => {
              const amt = (b.id === 'b1' ? entry.alloc['security'] : entry.alloc[b.id]) || 0;
              return amt > 0 ? {...b, current: Math.max(0, b.current - amt)} : b;
            }),
            surplusAllocations: (s.surplusAllocations || []).filter(e => e.id !== a.id),
          };
        }

        case 'SECURITY_GOAL':
          return {...s, securityGoal: a.goal};

        case 'UPDATE_PROFILE':
          return {...s, userName: a.name, userInitials: a.initials};

        case 'ADD_CATEGORY':
          return {...s, categories: [...s.categories, {id: genId(), budget: 0, ...a.cat}]};
        case 'EDIT_CATEGORY':
          return {...s, categories: s.categories.map(c => c.id===a.cat.id ? a.cat : c)};
        case 'DELETE_CATEGORY':
          return {...s, categories: s.categories.filter(c => c.id !== a.id)};
        case 'SET_CAT_BUDGET':
          return {...s, categories: s.categories.map(c => c.id===a.id ? {...c, budget: Math.max(0,a.budget)} : c)};

        case 'SET_PAGE_LABEL':
          return { ...s, pageLabels: { ...(s.pageLabels || {}), [a.pageId]: a.label } };

        case 'RESTORE_STATE':
          return { ...INITIAL_STATE, ...a.data, page: 'dashboard' };

        case 'LOAD_STATE':
          return { ...INITIAL_STATE, ...a.payload, page: s.page || 'dashboard' };

        case 'SET_URSSAF_ACTIVITY': {
          const r = a.actType === 'custom' ? a.rate : (URSSAF_ACTIVITIES.find(x=>x.value===a.actType)?.rate ?? s.urssafRate);
          return {...s, urssafActivityType: a.actType, urssafRate: r};
        }
        case 'SET_URSSAF_STATUS': {
          const list = s.urssafStatuses || [];
          const exists = list.find(u => u.mk === a.mk);
          if (exists) return {...s, urssafStatuses: list.map(u => u.mk===a.mk ? {...u, status:a.status} : u)};
          return {...s, urssafStatuses: [...list, {id:genId(), mk:a.mk, status:a.status}]};
        }

        default: return s;
      }
    }

    /* --- Income Form (add + edit) --- */
    const IncomeForm = ({ open, onClose, onSubmit, initial }) => {
      const isEdit = !!initial?.id;
      const [name,   setName]   = useState('');
      const [amount, setAmount] = useState('');
      const [source, setSource] = useState('salaire');
      const [date,   setDate]   = useState('');
      const [note,   setNote]   = useState('');
      const [error,  setError]  = useState('');
      useEffect(() => {
        if (!open) return;
        setName(initial?.name || '');
        setAmount(initial?.amount ? String(Math.abs(initial.amount)) : '');
        setSource(initial?.source || 'salaire');
        setDate(initial?.date?.match?.(/^\d{4}-\d{2}-\d{2}$/) ? initial.date : new Date().toISOString().split('T')[0]);
        setNote(initial?.note || '');
        setError('');
      }, [open]);
      const submit = () => {
        if (!name.trim() || !amount) { setError('Le nom et le montant sont requis.'); return; }
        onSubmit({
          ...(isEdit ? {id:initial.id, mk:initial.mk} : {}),
          name:name.trim(), amount:+amount, source, date:date||new Date().toISOString().split('T')[0], note,
        });
        onClose();
      };
      if (!open) return null;
      return (
        <Modal open={open} onClose={onClose} title={isEdit ? 'Modifier le revenu' : 'Nouveau revenu'}
          footer={<><Button variant="ghost" onClick={onClose}>Annuler</Button>
            <Button variant="primary" leftIcon="check" onClick={submit}>{isEdit?'Mettre à jour':'Enregistrer'}</Button></>}>
          <Field label="Nom"><Input placeholder="Ex. Salaire" value={name} onChange={e=>setName(e.target.value)} autoFocus/></Field>
          <div className="grid-2">
            <Field label="Montant (€)"><Input type="number" placeholder="2400" value={amount} onChange={e=>setAmount(e.target.value)}/></Field>
            <Field label="Date"><input type="date" className="input" value={date} onChange={e=>setDate(e.target.value)}/></Field>
          </div>
          <Field label="Source">
            <Select value={source} onChange={e=>setSource(e.target.value)}>
              <option value="salaire">Salaire</option>
              <option value="freelance">Freelance</option>
              <option value="remboursement">Remboursement</option>
              <option value="aide">Aide</option>
              <option value="autre">Autre</option>
            </Select>
          </Field>
          <Field label="Commentaire (optionnel)"><Textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Détail, contexte…"/></Field>
          {error && <div style={{color:'var(--red)',fontSize:13,background:'var(--red-soft)',padding:'10px 12px',borderRadius:12}}>{error}</div>}
          {!isEdit && (
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 12px',background:'var(--green-100)',borderRadius:12,fontSize:12.5,color:'var(--green-800)'}}>
              <I name="calendar" size={13} color="var(--green-800)"/>
              Ce revenu alimentera le budget du mois suivant.
            </div>
          )}
        </Modal>
      );
    };

    /* --- Expense Form (add + edit) --- */
    const ExpenseForm = ({ open, onClose, onSubmit, initial, categories, selectedMonth }) => {
      const isEdit = !!initial?.id;
      const [name,   setName]   = useState('');
      const [amount, setAmount] = useState('');
      const [cat,    setCat]    = useState('');
      const [type,   setType]   = useState('variable');
      const [method, setMethod] = useState('Carte');
      const [date,   setDate]   = useState('');
      const [note,   setNote]   = useState('');
      const [error,  setError]  = useState('');
      useEffect(() => {
        if (!open) return;
        setName(initial?.name || '');
        setAmount(initial?.amount ? String(Math.abs(initial.amount)) : '');
        setCat(initial?.cat || categories[0]?.id || '');
        setType(initial?.type || 'variable');
        setMethod(initial?.method || 'Carte');
        setDate(initial?.date?.match?.(/^\d{4}-\d{2}-\d{2}$/) ? initial.date : new Date().toISOString().split('T')[0]);
        setNote(initial?.note || '');
        setError('');
      }, [open]);
      const submit = () => {
        if (!name.trim() || !amount) { setError('Le nom et le montant sont requis.'); return; }
        onSubmit({
          ...(isEdit ? {id:initial.id, mk:initial.mk} : {mk:selectedMonth}),
          name:name.trim(), amount:-Math.abs(+amount), cat, type, method, date:date||new Date().toISOString().split('T')[0], note, status:'ok',
        });
        onClose();
      };
      if (!open) return null;
      return (
        <Modal open={open} onClose={onClose} title={isEdit ? 'Modifier la dépense' : 'Nouvelle dépense'}
          footer={<><Button variant="ghost" onClick={onClose}>Annuler</Button>
            <Button variant="primary" leftIcon="check" onClick={submit}>{isEdit?'Mettre à jour':'Enregistrer'}</Button></>}>
          <Field label="Nom"><Input placeholder="Ex. Courses" value={name} onChange={e=>setName(e.target.value)} autoFocus/></Field>
          <div className="grid-2">
            <Field label="Montant (€)"><Input type="number" placeholder="64" value={amount} onChange={e=>setAmount(e.target.value)}/></Field>
            <Field label="Date"><input type="date" className="input" value={date} onChange={e=>setDate(e.target.value)}/></Field>
          </div>
          <div className="grid-2">
            <Field label="Catégorie">
              <Select value={cat} onChange={e=>setCat(e.target.value)}>
                {categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </Select>
            </Field>
            <Field label="Type">
              <Select value={type} onChange={e=>setType(e.target.value)}>
                <option value="fixe">Fixe</option>
                <option value="variable">Variable</option>
              </Select>
            </Field>
          </div>
          <Field label="Moyen de paiement">
            <Select value={method} onChange={e=>setMethod(e.target.value)}>
              <option>Carte</option><option>Virement</option><option>Prélèvement</option><option>Espèces</option>
            </Select>
          </Field>
          <Field label="Commentaire (optionnel)"><Textarea value={note} onChange={e=>setNote(e.target.value)}/></Field>
          {error && <div style={{color:'var(--red)',fontSize:13,background:'var(--red-soft)',padding:'10px 12px',borderRadius:12}}>{error}</div>}
        </Modal>
      );
    };

    /* ═══════════════════════════════════════════════════
       GIST SYNC
       ═══════════════════════════════════════════════════ */
    const GIST_TOKEN = localStorage.getItem('budgetisation_gist_token') || '';
    const GIST_FILENAME = 'budgetisation-data.json';

    const getToken = () => localStorage.getItem('budgetisation_gist_token') || '';

    const gistRead = async (gistId) => {
      const tok = getToken();
      if (!tok) throw new Error('Token absent');
      const r = await fetch(`https://api.github.com/gists/${gistId}`, {
        headers: { Authorization: `token ${tok}` }
      });
      if (!r.ok) throw new Error('Gist introuvable');
      const data = await r.json();
      const content = data.files?.[GIST_FILENAME]?.content;
      if (!content) throw new Error('Fichier absent du Gist');
      return JSON.parse(content);
    };

    const gistWrite = async (gistId, payload) => {
      const tok = getToken();
      if (!tok) throw new Error('Token absent');
      const body = { files: { [GIST_FILENAME]: { content: JSON.stringify(payload) } } };
      if (gistId) {
        await fetch(`https://api.github.com/gists/${gistId}`, {
          method: 'PATCH',
          headers: { Authorization: `token ${tok}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        return gistId;
      } else {
        const r = await fetch('https://api.github.com/gists', {
          method: 'POST',
          headers: { Authorization: `token ${tok}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...body, description: 'Budgétisation – données sync', public: false })
        });
        const d = await r.json();
        return d.id;
      }
    };

    /* --- App root --- */
    const App = () => {
      const [state, dispatch] = useReducer(appReducer, undefined, () => {
        try {
          const saved = localStorage.getItem('budgetisation');
          if (saved) return {...INITIAL_STATE, ...JSON.parse(saved), page: 'dashboard'};
        } catch(e) {}
        return {...INITIAL_STATE, page: 'dashboard'};
      });
      const [formState,    setFormState]    = useState(null);
      const [confirmState, setConfirmState] = useState(null);
      const [toasts,       setToasts]       = useState([]);
      const [searchQuery,  setSearchQuery]  = useState('');
      const [syncStatus,   setSyncStatus]   = useState('idle');
      const gistIdRef  = useRef(localStorage.getItem('budgetisation_gist') || null);
      const syncTimer  = useRef(null);
      const isFirstLoad = useRef(true);

      /* Au démarrage : si ?migrate=DATA dans l'URL, charger les données directement */
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const migrateParam = params.get('migrate');
        if (migrateParam) {
          try {
            const decoded = decodeURIComponent(escape(atob(migrateParam)));
            const data = JSON.parse(decoded);
            dispatch({ type: 'LOAD_STATE', payload: data });
            localStorage.setItem('budgetisation', decoded);
            window.history.replaceState({}, '', window.location.pathname);
          } catch(e) { console.error('migrate error', e); }
          return;
        }
        const gistParam = params.get('gist');
        if (gistParam) {
          setSyncStatus('syncing');
          gistRead(gistParam).then(data => {
            dispatch({ type: 'LOAD_STATE', payload: data });
            gistIdRef.current = gistParam;
            localStorage.setItem('budgetisation_gist', gistParam);
            window.history.replaceState({}, '', window.location.pathname);
            setSyncStatus('ok');
            setTimeout(() => setSyncStatus('idle'), 2000);
          }).catch(() => { setSyncStatus('error'); setTimeout(() => setSyncStatus('idle'), 3000); });
        } else if (gistIdRef.current) {
          setSyncStatus('syncing');
          gistRead(gistIdRef.current).then(data => {
            dispatch({ type: 'LOAD_STATE', payload: data });
            setSyncStatus('ok');
            setTimeout(() => setSyncStatus('idle'), 2000);
          }).catch(() => setSyncStatus('idle'));
        }
      }, []);

      /* Sync vers Gist à chaque changement de state (debounced 2s) */
      useEffect(() => {
        try { localStorage.setItem('budgetisation', JSON.stringify(state)); } catch(e) {}
        if (isFirstLoad.current) { isFirstLoad.current = false; return; }
        clearTimeout(syncTimer.current);
        syncTimer.current = setTimeout(async () => {
          setSyncStatus('syncing');
          try {
            const id = await gistWrite(gistIdRef.current, state);
            if (!gistIdRef.current) {
              gistIdRef.current = id;
              localStorage.setItem('budgetisation_gist', id);
            }
            setSyncStatus('ok');
            setTimeout(() => setSyncStatus('idle'), 2000);
          } catch(e) {
            setSyncStatus('error');
            setTimeout(() => setSyncStatus('idle'), 3000);
          }
        }, 2000);
      }, [state]);

      useEffect(() => {
        const BRAND_SVG = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23174C3F'/><path d='M10 7v18M10 7h7.5c2.5 0 4.5 1.7 4.5 4.5s-1.7 4.5-4.5 4.5H10M10 16h8c2.5 0 4.5 1.7 4.5 4.5s-1.7 4.5-4.5 4.5H10' fill='none' stroke='%23B8F28B' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/></svg>`;
        let link = document.querySelector('link[rel="icon"]');
        if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
        link.href = `data:image/svg+xml,${BRAND_SVG}`;
      }, []);

      const toast = (text, icon='check') => {
        const id = genId();
        setToasts(t => [...t, {id, text, icon}]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);
      };
      const navigate   = (page) => dispatch({type:'PAGE', page});
      const openForm   = (type, data=null) => setFormState({type, data});
      const askConfirm = (label, cb) => setConfirmState({label, cb});

      const PL = state.pageLabels || {};
      const PAGE_TITLES = {
        dashboard:    {title: PL.dashboard    || 'Dashboard',    sub:`Bonjour ${state.userName} — voici ton mois en un coup d'œil`},
        revenus:      {title: PL.revenus      || 'Revenus',      sub:null},
        depenses:     {title: PL.depenses     || 'Objectifs',    sub:'Dépenses fixes & suivi du mois'},
        transactions: {title: PL.transactions || 'Transactions', sub:null},
        budgets:      {title: PL.budgets      || 'Budgets',      sub:null},
        repartition:  {title: PL.repartition  || 'Répartition',  sub:null},
        urssaf:       {title: PL.urssaf       || 'URSSAF',       sub:'Cotisations micro-entreprise'},
        analyse:      {title: PL.analyse      || 'Analyse',      sub:null},
        parametres:   {title: PL.parametres   || 'Paramètres',   sub:null},
      };
      const head = PAGE_TITLES[state.page] || PAGE_TITLES.dashboard;
      const pageProps = {state, dispatch, openForm, navigate, askConfirm, toast};

      let body;
      switch(state.page) {
        case 'dashboard':    body = <Dashboard    {...pageProps}/>; break;
        case 'revenus':      body = <Revenus      {...pageProps}/>; break;
        case 'depenses':     body = <Depenses     {...pageProps}/>; break;
        case 'transactions': body = <Transactions {...pageProps}/>; break;
        case 'budgets':      body = <Budgets      {...pageProps}/>; break;
        case 'repartition':  body = <Repartition  {...pageProps}/>; break;
        case 'urssaf':       body = <Urssaf       {...pageProps}/>; break;
        case 'analyse':      body = <Analyse      {...pageProps}/>; break;
        case 'parametres':   body = <Parametres   {...pageProps}/>; break;
        default:             body = <Dashboard    {...pageProps}/>;
      }

      return (
        <div className="app">
          <Sidebar page={state.page} onChange={navigate} pageLabels={state.pageLabels}/>
          <div className="main-area">
            <div style={{gridColumn:'1/-1'}}>
              <Header
                title={head.title} sub={head.sub}
                selectedMonth={state.selectedMonth}
                onPrevMonth={()=>dispatch({type:'SET_MONTH', key:prevMK(state.selectedMonth)})}
                onNextMonth={()=>dispatch({type:'SET_MONTH', key:nextMK(state.selectedMonth)})}
                userInitials={state.userInitials}
                searchQuery={searchQuery}
                onSearch={setSearchQuery}
              />
            </div>
            {body}
          </div>

          <IncomeForm
            open={formState?.type==='income'}
            onClose={()=>setFormState(null)}
            initial={formState?.data}
            onSubmit={(payload) => {
              if (payload.id) {
                dispatch({type:'EDIT_INCOME', payload});
                toast('Revenu mis à jour');
              } else {
                dispatch({type:'ADD_INCOME', payload: {...payload, mk: state.selectedMonth}});
                toast('Revenu ajouté');
              }
            }}
          />

          <ExpenseForm
            open={formState?.type==='expense'}
            onClose={()=>setFormState(null)}
            initial={formState?.data}
            categories={state.categories}
            selectedMonth={state.selectedMonth}
            onSubmit={(payload) => {
              if (payload.id) {
                dispatch({type:'EDIT_TRANSACTION', payload});
                toast('Dépense mise à jour');
              } else {
                dispatch({type:'ADD_EXPENSE', payload});
                toast('Dépense ajoutée');
              }
            }}
          />

          <ConfirmModal
            open={!!confirmState}
            label={confirmState?.label}
            onConfirm={() => { confirmState?.cb(); toast('Supprimé', 'trash'); }}
            onClose={() => setConfirmState(null)}
          />

          {searchQuery && (
            <SearchOverlay
              query={searchQuery}
              state={state}
              onClose={()=>setSearchQuery('')}
              navigate={navigate}
            />
          )}

          <ToastStack toasts={toasts}/>

          {/* ── SYNC INDICATOR ── */}
          <div style={{
            position:'fixed', bottom:24, right:24, zIndex:100,
            display:'flex', flexDirection:'column', alignItems:'flex-end', gap:8
          }}>
            {/* Bouton partage */}
            <button
              onClick={() => {
                const tok = localStorage.getItem('budgetisation_gist_token');
                if (!tok) {
                  const t = prompt('Colle ton token GitHub (ghp_...) pour activer la sync multi-appareils :');
                  if (t && t.startsWith('ghp_')) {
                    localStorage.setItem('budgetisation_gist_token', t.trim());
                    toast('Token enregistré, sync activée !', 'check');
                  } else if (t) {
                    toast('Token invalide (doit commencer par ghp_)', 'x');
                  }
                  return;
                }
                const url = window.location.origin + window.location.pathname + (gistIdRef.current ? `?gist=${gistIdRef.current}` : '');
                navigator.clipboard.writeText(url).then(() => toast('Lien copié ! Colle-le sur ton autre appareil', 'check'));
              }}
              style={{
                background:'var(--green-800)', color:'white',
                border:'none', borderRadius:999, padding:'10px 16px',
                fontSize:13, fontWeight:600, cursor:'pointer',
                display:'flex', alignItems:'center', gap:8,
                boxShadow:'0 4px 16px rgba(15,51,43,.25)'
              }}
              title="Copier le lien de synchronisation"
            >
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
              </svg>
              Sync multi-appareils
            </button>
            {/* Indicateur statut */}
            {syncStatus !== 'idle' && (
              <div style={{
                background:'white', border:'1px solid var(--border)',
                borderRadius:999, padding:'7px 14px',
                fontSize:12.5, fontWeight:600,
                display:'flex', alignItems:'center', gap:7,
                boxShadow:'0 2px 12px rgba(0,0,0,.08)',
                color: syncStatus==='ok' ? 'var(--green-800)' : syncStatus==='error' ? 'var(--red)' : 'var(--text-2)'
              }}>
                {syncStatus==='syncing' && <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M21 12a9 9 0 1 1-6.2-8.6"/></svg>}
                {syncStatus==='ok'      && <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M20 6 9 17l-5-5"/></svg>}
                {syncStatus==='error'   && <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>}
                {syncStatus==='syncing' ? 'Sync en cours…' : syncStatus==='ok' ? 'Synchronisé' : 'Erreur sync'}
              </div>
            )}
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
